<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Top face (yellow) -->
  <polygon points="50,5 95,28 50,51 5,28" fill="#F9C700"/>
  <!-- Left face (green) -->
  <polygon points="5,28 50,51 50,95 5,72" fill="#2E7D32"/>
  <!-- Right face (orange) -->
  <polygon points="95,28 50,51 50,95 95,72" fill="#BF4800"/>
  <!-- Grid lines top -->
  <line x1="50" y1="5"  x2="50" y2="51" stroke="#000" stroke-width="1.2"/>
  <line x1="35" y1="13" x2="35" y2="42" stroke="#000" stroke-width="1"/>
  <line x1="65" y1="13" x2="65" y2="42" stroke="#000" stroke-width="1"/>
  <line x1="17" y1="37" x2="83" y2="37" stroke="#000" stroke-width="1"/>
  <line x1="28" y1="19" x2="72" y2="19" stroke="#000" stroke-width="1"/>
  <!-- Grid lines left -->
  <line x1="5"  y1="51" x2="50" y2="51" stroke="#000" stroke-width="1"/>
  <line x1="5"  y1="62" x2="50" y2="62" stroke="#000" stroke-width="1"/>
  <line x1="5"  y1="73" x2="50" y2="73" stroke="#000" stroke-width="1"/>
  <line x1="20" y1="44" x2="20" y2="88" stroke="#000" stroke-width="1"/>
  <line x1="35" y1="51" x2="35" y2="95" stroke="#000" stroke-width="1"/>
  <!-- Grid lines right -->
  <line x1="50" y1="51" x2="95" y2="51" stroke="#000" stroke-width="1"/>
  <line x1="50" y1="62" x2="95" y2="62" stroke="#000" stroke-width="1"/>
  <line x1="50" y1="73" x2="95" y2="73" stroke="#000" stroke-width="1"/>
  <line x1="65" y1="51" x2="65" y2="95" stroke="#000" stroke-width="1"/>
  <line x1="80" y1="44" x2="80" y2="88" stroke="#000" stroke-width="1"/>
  <!-- Outline -->
  <polygon points="50,5 95,28 95,72 50,95 5,72 5,28" fill="none" stroke="#000" stroke-width="2" stroke-linejoin="round"/>
  <line x1="50" y1="51" x2="50" y2="95" stroke="#000" stroke-width="1.5"/>
</svg>